[[language]]
name = "nix"
auto-format = true
formatter = { command = "nixfmt" } 

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]
config = { typescript = { updateImportsOnFileMove = { enabled = "always" } } }

[[language]]
name = "typescript"
language-servers = [ { name = "vtsls", except-features = ["format"] }, "biome" ]
auto-format = true

[[language]]
name = "tsx"
language-servers = [ { name = "vtsls", except-features = ["format"] }, "biome" ]
auto-format = true

[[language]]
name = "javascript"
language-servers = [ { name = "vtsls", except-features = ["format"] }, "biome" ]
auto-format = true
